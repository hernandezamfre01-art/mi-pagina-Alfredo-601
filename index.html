<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi página web</title>

    <!-- CSS externo -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* ESTILOS GENERALES */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            color: #000;
            transition: background 0.3s, color 0.3s;
        }

        header {
            background: #007bff;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
        }

        section {
            padding: 20px;
            text-align: center;
        }

        img {
            max-width: 100%;
            border-radius: 10px;
        }

        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 15px;
        }

        /* BOTONES */
        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #007bff;
            color: white;
            font-size: 16px;
        }

        button:hover {
            background: #0056b3;
        }

        /* FORMULARIO */
        form {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 300px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        /* MODO OSCURO */
        .dark-mode {
            background: #121212;
            color: white;
        }

        .dark-mode header,
        .dark-mode nav,
        .dark-mode section,
        .dark-mode form,
        .dark-mode footer {
            background: #1e1e1e;
            color: white;
        }

        .dark-mode input,
        .dark-mode textarea {
            background: #333;
            color: white;
            border: 1px solid #555;
        }

        /* BOTONES FLOTANTES */
        .btn-flotante {
            position: fixed;
            bottom: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .btn-flotante:hover {
            transform: scale(1.1);
        }

        .facebook {
            right: 20px;
            background: #1877f2;
        }

        .whatsapp {
            right: 90px;
            background: #25d366;
        }

        /* FLECHA ARRIBA */
        .arrow-up {
            position: fixed;
            bottom: 90px;
            right: 20px;
            background: #333;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 20px;
        }
    </style>
</head>

<body id="top">

    <!-- HEADER -->
    <header>
        <h1>Mi página web</h1>

        <button id="btnDarkMode" onclick="toggleDarkMode()">
            Modo oscuro
        </button>
    </header>

    <!-- MENÚ -->
    <nav>
        <a href="#sobre-mi">Sobre mí</a>
        <a href="#pec">Proyecto PEC</a>
        <a href="#contacto">Contacto</a>
    </nav>

    <!-- SOBRE MÍ -->
    <section id="sobre-mi">
        <h2>Sobre mí</h2>

        <p>Mi nombre es Alfredo Salinas Hernández.</p>
        <h3>Estudio Mecánica</h3>
        <h3>Me interesa conocer más sobre el PEC</h3>
        <h3>Mecánico profesional</h3>

        <!-- MENSAJE 1 -->
        <button id="btnMensaje"
            onclick="toggleMensaje('mensaje','btnMensaje','Cuida y protege a los animales.','Mostrar mensaje','Ocultar mensaje')">
            Mostrar mensaje
        </button>

        <p id="mensaje" style="display:none;"></p>

        <!-- MENSAJE 2 -->
        <button id="btnMensaje2"
            onclick="toggleMensaje('mensaje2','btnMensaje2','Hola, ¿cómo están?','Mostrar otro mensaje','Ocultar mensaje')">
            Mostrar otro mensaje
        </button>

        <p id="mensaje2" style="display:none;"></p>

        <!-- IMAGEN -->
        <img src="banner.png" alt="Sobre mí">
    </section>

    <!-- PEC -->
    <section id="pec">
        <h2>Sobre el PEC</h2>

        <img src="images.jfif"
            alt="Imagen sobre el proyecto Huellas"
            width="800">

        <p>Proyecto Huellas: cuidado animal y salud comunitaria.</p>
    </section>

    <!-- FORMULARIO -->
    <section id="contacto">
        <h2>Formulario de contacto</h2>

        <form>
            <label>Nombre:</label>
            <input type="text" placeholder="Ingresa tu nombre" required>

            <label>Correo:</label>
            <input type="email" placeholder="Ingresa tu correo" required>

            <label>Mensaje:</label>
            <textarea rows="4" placeholder="Escribe tu mensaje"></textarea>

            <button type="submit">Enviar</button>
        </form>
    </section>

    <!-- FOOTER -->
    <footer>
        <p>2026 - Alfredo</p>
    </footer>

    <!-- BOTÓN FACEBOOK -->
    <a href="https://www.facebook.com/" target="_blank"
        class="btn-flotante facebook">
        <i class="fab fa-facebook-f"></i>
    </a>

    <!-- BOTÓN WHATSAPP -->
    <a href="https://wa.me/5210000000000" target="_blank"
        class="btn-flotante whatsapp">
        <i class="fab fa-whatsapp"></i>
    </a>

    <!-- FLECHA ARRIBA -->
    <a href="#top" class="arrow-up">
        <i class="fas fa-arrow-up"></i>
    </a>

    <!-- JAVASCRIPT -->
    <script>

        // MOSTRAR / OCULTAR MENSAJES
        function toggleMensaje(idMensaje, idBoton, textoMostrar, textoBotonMostrar, textoBotonOcultar) {

            const mensaje = document.getElementById(idMensaje);
            const boton = document.getElementById(idBoton);

            if (mensaje.style.display === "none" || mensaje.style.display === "") {

                mensaje.innerText = textoMostrar;
                mensaje.style.display = "block";
                boton.innerText = textoBotonOcultar;

            } else {

                mensaje.style.display = "none";
                boton.innerText = textoBotonMostrar;
            }
        }

        // MODO OSCURO
        function toggleDarkMode() {

            document.body.classList.toggle("dark-mode");

            const boton = document.getElementById("btnDarkMode");

            if (document.body.classList.contains("dark-mode")) {
                boton.innerText = "Modo claro";
            } else {
                boton.innerText = "Modo oscuro";
            }
        }

    </script>

</body>
</html>
